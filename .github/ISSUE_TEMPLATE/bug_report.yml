name: Bug Report
description: Report a bug in Ferrite
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.

  - type: input
    id: version
    attributes:
      label: Ferrite Version
      description: Which version or commit are you running?
      placeholder: "e.g. 0.1.0 or commit hash"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Open a .dll file
        2. Expand a namespace
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What happened instead?
    validations:
      required: true

  - type: input
    id: macos-version
    attributes:
      label: macOS Version
      placeholder: "e.g. macOS 15.2"
    validations:
      required: true

  - type: input
    id: architecture
    attributes:
      label: Architecture
      placeholder: "Apple Silicon (arm64) or Intel (x86_64)"
    validations:
      required: true

  - type: textarea
    id: assembly
    attributes:
      label: Assembly Details
      description: If the bug involves a specific .dll/.exe, provide details (name, .NET version, how to obtain it).

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Paste any relevant console output, crash logs, or screenshots.
