name: Ferrite
options:
  bundleIdPrefix: com.ferrite
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

targets:
  Ferrite:
    type: application
    platform: macOS
    sources:
      - path: src/swift/Ferrite
        excludes:
          - "Generated/ferrite_ffiFFI.h"
          - "Generated/ferrite_ffiFFI.modulemap"
          - "Info.plist"
          - "AppIcon.icon"
      - path: src/swift/FerriteFFI
        headerVisibility: project
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ferrite.app
        PRODUCT_NAME: Ferrite
        SWIFT_INCLUDE_PATHS: $(SRCROOT)/src/swift/FerriteFFI/include
        LIBRARY_SEARCH_PATHS:
          - $(SRCROOT)/libs
        OTHER_LDFLAGS:
          - -lferrite_ffi
        INFOPLIST_FILE: src/swift/Ferrite/Info.plist
        GENERATE_INFOPLIST_FILE: false
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Release:
          STRIP_INSTALLED_PRODUCT: YES
          DEPLOYMENT_POSTPROCESSING: YES
          DEAD_CODE_STRIPPING: YES
